{% extends "base.html" %} {% block title %}
<title>Dictionary App - Home</title>
{% endblock %} {% block home_active%} class="active" {% endblock%} {% block
content %}
<div class="row">
  <div class="col-md-6">
    <h1 class="header-text">Welcome to the Dictionary App!</h1>
    <p class="header-paragraph">
      This application allows you to look up definitions of words and manage
      your own dictionary.
    </p>

    <div class="row">
      <div class="col-sm-6">
        <form action="#" method="POST">
          <div class="form-group">
            <label for="word">Word</label>
            <input
              type="text"
              class="form-control"
              id="word"
              name="word"
              placeholder="Enter a word"
              required
            />
          </div>
          <button
            type="submit"
            style="outline: none"
            class="btn btn-primary btn-block btn-lg"
          >
            Submit
          </button>
        </form>
      </div>
      <div class="col-sm-6">
        <form action="#" method="POST">
          <div class="form-group">
            <label for="definition">Meaning</label>
            <textarea
              class="form-control"
              id="definition"
              placeholder="The meaning of the word shows here"
              disabled
            >{{user_response}}</textarea>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <img
      src="{{url_for('static', filename='images/encyclopedia.jpg')}}"
      alt="Dictionary Image"
      class="img-responsive"
    />
  </div>
</div>
{% endblock %}
